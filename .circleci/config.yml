version: 2.1

orbs:
  python: circleci/python@2.1.1
  node: circleci/node@5.1.0

jobs:
  test-backend:
    docker:
      - image: cimg/python:3.10
    steps:
      - checkout
      - run:
          name: Install Graphviz (provides ``dot``)
          command: sudo apt-get update && sudo apt-get install -y graphviz
      - run:
          name: Install Dependencies
          command: |
            python -m pip install --upgrade pip
            pip install ".[test]"
            # Track the latest published expert_op4grid_recommender release: the
            # >=0.2.4 floor documents the minimum the GST / superposition tests
            # need, and pip + --no-cache-dir always resolve to the newest release
            # above it (no stale pinned version to bump). --no-deps skips the
            # recommender's heavy transitive stack (pypowsybl already comes from
            # co_study4grid's own dependencies).
            pip install --no-deps --no-cache-dir "expert_op4grid_recommender>=0.2.4"
      - run:
          name: Run Pytest
          # Coverage is REPORT-ONLY (no fail-under floor yet — see
          # docs/architecture/code-quality-analysis.md §18).
          command: pytest --cov=expert_backend --cov-report=xml --cov-report=term-missing
      - store_artifacts:
          path: coverage.xml
          destination: backend-coverage

  test-frontend:
    docker:
      - image: cimg/node:20.10
    steps:
      - checkout
      - run:
          name: Install Frontend Dependencies
          command: |
            cd frontend
            npm install
      - run:
          name: Run Frontend Tests + coverage gate
          command: |
            cd frontend
            npm run test:coverage
      - store_artifacts:
          path: frontend/coverage
          destination: frontend-coverage
      - run:
          name: Run Linter
          command: |
            cd frontend
            npm run lint

  code-quality:
    docker:
      - image: cimg/python:3.10
    steps:
      - checkout
      - run:
          name: Install quality tooling
          command: |
            python -m pip install --upgrade pip
            pip install ".[quality]"
            pip install pytest
      - run:
          name: Ruff (lightweight lint)
          command: ruff check expert_backend scripts
      - run:
          name: Code-quality gate
          command: python scripts/check_code_quality.py
      - run:
          name: Reporter unit tests
          command: pytest scripts/test_code_quality_report.py -q
      - run:
          name: mypy (gate)
          command: mypy
      - run:
          name: Generate report artifacts
          command: |
            python scripts/code_quality_report.py \
              --output reports/code-quality.json \
              --markdown reports/code-quality.md
      - store_artifacts:
          path: reports
          destination: code-quality

workflows:
  test-workflow:
    jobs:
      - test-backend
      - test-frontend
      - code-quality
